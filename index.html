<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gyönyörű vagy!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #1a0033 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP 1/3 ── */
    .top {
      height: 33.333%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .glitter-text {
      font-family: 'Georgia', serif;
      font-size: clamp(5rem, 16vw, 12rem);
      font-weight: bold;
      background: linear-gradient(
        90deg,
        #ff99cc,
        #ffdd00,
        #ff66aa,
        #fffacd,
        #ff99cc,
        #ffdd00,
        #ff66aa,
        #fffacd
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.5s linear infinite, textPulse 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(255, 200, 100, 0.8))
               drop-shadow(0 0 20px rgba(255, 150, 200, 0.6));
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 2.3;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    @keyframes textPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 8px rgba(255, 200, 100, 0.8))
                drop-shadow(0 0 20px rgba(255, 150, 200, 0.6));
      }
      50% {
        transform: scale(1.1);
        filter: drop-shadow(0 0 18px rgba(255, 220, 80, 1))
                drop-shadow(0 0 40px rgba(255, 150, 220, 0.9));
      }
    }

    /* Sparkling stars around the text */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 1; transform: scale(1.4); }
    }

    /* ── BOTTOM 2/3 ── */
    .bottom {
      height: 66.667%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emoji {
      font-size: clamp(12rem, 44vw, 32rem);
      line-height: 1;
      animation: pulse 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 100, 180, 0.7))
               drop-shadow(0 0 60px rgba(255, 60, 120, 0.4));
      user-select: none;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 20px rgba(255, 100, 180, 0.6))
                drop-shadow(0 0 50px rgba(255, 60, 120, 0.3));
      }
      50% {
        transform: scale(1.18);
        filter: drop-shadow(0 0 40px rgba(255, 120, 200, 1))
                drop-shadow(0 0 90px rgba(255, 80, 160, 0.7));
      }
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="stars" id="stars"></div>
    <span class="glitter-text">Gyönyörű<br>vagy!</span>
  </div>

  <div class="bottom">
    <span class="emoji">😍</span>
  </div>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.setProperty('--dur',   (1 + Math.random() * 2).toFixed(2) + 's');
      star.style.setProperty('--delay', (Math.random() * 2).toFixed(2) + 's');
      star.style.left = Math.random() * 100 + '%';
      star.style.top  = Math.random() * 100 + '%';
      const size = (3 + Math.random() * 5).toFixed(1) + 'px';
      star.style.width  = size;
      star.style.height = size;
      const hue = Math.random() < 0.5 ? '#fffacd' : (Math.random() < 0.5 ? '#ffccee' : '#ffffaa');
      star.style.background = hue;
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
